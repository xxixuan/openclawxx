name: Sync Upstream Tag

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.SYNC_TOKEN }}
          persist-credentials: true

      - name: Get latest upstream tag
        id: upstream
        run: |
          TAG=$(curl -s https://api.github.com/repos/openclaw/openclaw/releases/latest | jq -r .tag_name)
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Update README
        env:
          TAG: ${{ steps.upstream.outputs.tag }}
        run: |
          DATE=$(date -u "+%Y-%m-%d")
          python3 -c "import os; content = open('README.md').read(); open('README.md','w').write(content.replace('LATEST_TAG', os.environ['TAG']).replace('SYNC_DATE', os.environ['DATE']))" 2>/dev/null || true
          cat > README.md << 'RAWEOF'
# openclawxx

OpenClaw custom image - extends official base with extra APT packages.

## Base Image
- **Upstream**: openclaw/openclaw
- **Latest Tag**: LATEST_TAG
- **Last Synced**: SYNC_DATE

## Included Packages
tmux ffmpeg jq

## Dockerfile
FROM ghcr.io/openclaw/openclaw:latest
ARG EXTRA_APT_PACKAGES=
RUN apt-get update && apt-get install -y tmux ffmpeg jq

## Auto-Build
Upstream new tag -> update README -> push -> ACR build triggered
RAWEOF
          sed -i 's/LATEST_TAG/$TAG/g' README.md
          sed -i 's/SYNC_DATE/$DATE/g' README.md

      - name: Commit and push
        env:
          TAG: ${{ steps.upstream.outputs.tag }}
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --cached --quiet; then
            echo "NO_CHANGES"
          else
            git commit -m "sync: upstream ${{ steps.upstream.outputs.tag }}"
            git push
          fi
