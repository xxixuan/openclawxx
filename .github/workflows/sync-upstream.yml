name: Sync Upstream Tag

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.SYNC_TOKEN }}
          persist-credentials: true
      - name: Get latest upstream tag
        id: upstream
        run: |
          TAG=$(curl -s https://api.github.com/repos/openclaw/openclaw/releases/latest | jq -r .tag_name)
          echo "tag=$TAG" >> $GITHUB_OUTPUT
      - name: Update README
        env:
          TAG: ${{ steps.upstream.outputs.tag }}
        run: |
          DATE=$(date -u "+%Y-%m-%d")
          cat > README.md << 'RAWEOF'
# openclawxx
OpenClaw custom image.
## Base Image
- Latest Tag: TAG_VAL
- Last Synced: DATE_VAL
RAWEOF
          sed -i "s/TAG_VAL/$TAG/g" README.md
          sed -i "s/DATE_VAL/$DATE/g" README.md
      - name: Commit and push
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --cached --quiet; then echo "NO_CHANGES"
          else git commit -m "sync: upstream ${{ steps.upstream.outputs.tag }}" && git push; fi
