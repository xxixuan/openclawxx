name: Sync Upstream Tag
on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"
  repository_dispatch:
    types: [trigger-sync]

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        run: |
          gh auth setup-git
          git clone https://github.com/xxixuan/openclawxx.git .

      - name: Get latest tag
        id: gettag
        run: |
          gh auth setup-git
          TAG=$(gh release view --repo openclaw/openclaw --json tagName --jq '.tagName' 2>/dev/null || \
            curl -s https://api.github.com/repos/openclaw/openclaw/releases/latest | sed -n 's/.*"tag_name": *"\([^"]*\)".*/\1/p' | head -1)
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Current tag: $TAG"

      - name: Update README
        env:
          TAG: ${{ steps.gettag.outputs.tag }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          cat > README.md << 'README'
          # openclawxx
          Latest Upstream Tag: **$TAG**
          Last Synced: $DATE
          README
          echo "README updated"

      - name: Commit and push
        run: |
          gh auth setup-git
          git remote set-url origin https://github.com/xxixuan/openclawxx.git
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet && echo "No changes" || { git commit -m "sync: update upstream tag"; git push; echo "Pushed!"; }
