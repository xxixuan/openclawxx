name: Sync Upstream Tag
on:
  schedule:
    - cron: "0 */6 * * *"
  repository_dispatch:
    types: [trigger-sync]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.SYNC_TOKEN }}

      - name: Get tag
        id: gettag
        run: |
          TAG=$(curl -s https://api.github.com/repos/openclaw/openclaw/releases/latest | sed -n 's/.*"tag_name":"\([^"]*\)".*/\1/p' | head -1)
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Update README
        env:
          TAG: ${{ steps.gettag.outputs.tag }}
        run: |
          echo "# openclawxx" > README.md
          echo "Latest Upstream Tag: $TAG" >> README.md
          echo "Last Synced: $(date -u +%Y-%m-%d)" >> README.md

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions@users.nore.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "sync" && git push
