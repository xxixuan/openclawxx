name: Sync Upstream Tag

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"
  repository_dispatch:
    types: [trigger-sync]

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Get latest upstream tag
        id: gettag
        run: |
          UPSTREAM_TAG=$(curl -s https://api.github.com/repos/openclaw/openclaw/releases/latest | sed -n 's/.*"tag_name": *"\([^"]*\)".*/\1/p' | head -1)
          echo "upstream_tag=$UPSTREAM_TAG" >> $GITHUB_OUTPUT
          echo "Upstream latest tag: $UPSTREAM_TAG"

      - name: Get current README content
        id: readme
        run: |
          if [ -f README.md ]; then
            CURRENT_TAG=$(sed -n 's/.*Latest Upstream Tag: \*\*\([^*]*\)\*\*.*/\1/p' README.md | head -1)
            echo "current_tag=$CURRENT_TAG" >> $GITHUB_OUTPUT
            echo "Current README tag: $CURRENT_TAG"
          else
            echo "current_tag=" >> $GITHUB_OUTPUT
            echo "No README found"
          fi

      - name: Update README only if tag changed
        if: steps.gettag.outputs.upstream_tag != steps.readme.outputs.current_tag
        env:
          UPSTREAM_TAG: ${{ steps.gettag.outputs.upstream_tag }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          cat > README.md << EOF
          # openclawxx
          Latest Upstream Tag: **${UPSTREAM_TAG}**
          Last Synced: ${DATE}
          EOF
          echo "README updated to ${UPSTREAM_TAG}"

      - name: Commit and push only if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions@users.noreply.github.com"
          git add README.md
          if git diff --cached --quiet; then
            echo "No changes to commit (tag unchanged)"
          else
            git commit -m "sync: update upstream tag"
            git push
            echo "Pushed!"
          fi